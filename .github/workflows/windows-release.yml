name: Windows Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      WINDOWS_CERTIFICATE_PFX_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      WINDOWS_CERTIFICATE_FILE_NAME: ${{ vars.WINDOWS_CERTIFICATE_FILE_NAME }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate TypeScript
        run: npx tsc --noEmit

      - name: Validate Windows signing secrets
        if: ${{ env.WINDOWS_CERTIFICATE_PFX_BASE64 != '' || env.WINDOWS_CERTIFICATE_PASSWORD != '' }}
        shell: pwsh
        run: |
          if ($env:WINDOWS_CERTIFICATE_PFX_BASE64 -eq "") {
            throw 'WINDOWS_CERTIFICATE_PFX_BASE64 is required when Windows code signing is enabled.'
          }

          if ($env:WINDOWS_CERTIFICATE_PASSWORD -eq "") {
            throw 'WINDOWS_CERTIFICATE_PASSWORD is required when Windows code signing is enabled.'
          }

      - name: Prepare Windows code signing certificate
        if: ${{ env.WINDOWS_CERTIFICATE_PFX_BASE64 != '' && env.WINDOWS_CERTIFICATE_PASSWORD != '' }}
        shell: pwsh
        run: |
          $certFileName = if ($env:WINDOWS_CERTIFICATE_FILE_NAME) { $env:WINDOWS_CERTIFICATE_FILE_NAME } else { 'codesign.pfx' }
          $certPath = Join-Path $env:RUNNER_TEMP $certFileName

          [System.IO.File]::WriteAllBytes(
            $certPath,
            [System.Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_PFX_BASE64)
          )

          "CSC_LINK=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CSC_KEY_PASSWORD=$env:WINDOWS_CERTIFICATE_PASSWORD" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build without Windows code signing
        if: ${{ env.WINDOWS_CERTIFICATE_PFX_BASE64 == '' && env.WINDOWS_CERTIFICATE_PASSWORD == '' }}
        shell: pwsh
        run: Write-Host 'Windows code signing is disabled for this run because no signing secrets are configured.'

      - name: Build Windows installer artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: npm run dist:win

      - name: Build and publish GitHub release assets
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: npm run release:win

      - name: Verify release outputs
        if: ${{ success() }}
        shell: pwsh
        run: |
          if (!(Test-Path release)) {
            throw 'release directory was not created'
          }

          $files = Get-ChildItem -Path release -Recurse -File
          if ($files.Count -eq 0) {
            throw 'release directory is empty'
          }

          $files | Select-Object FullName, Length

      - name: Upload Windows artifacts
        if: ${{ success() && !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v6
        with:
          name: yira-windows-${{ github.ref_name }}
          path: release/
          if-no-files-found: warn
