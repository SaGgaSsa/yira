name: Windows Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate TypeScript
        run: npx tsc --noEmit

      - name: Build Windows installer artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: npm run dist:win

      - name: Build and publish GitHub release assets
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: npm run release:win

      - name: Verify release outputs
        if: ${{ success() }}
        shell: pwsh
        run: |
          if (!(Test-Path release)) {
            throw 'release directory was not created'
          }

          $files = Get-ChildItem -Path release -Recurse -File
          if ($files.Count -eq 0) {
            throw 'release directory is empty'
          }

          $files | Select-Object FullName, Length

      - name: Upload Windows artifacts
        if: ${{ success() }}
        uses: actions/upload-artifact@v6
        with:
          name: yira-windows-${{ github.ref_name }}
          path: release/
          if-no-files-found: warn
